<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Radio (local)</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">
          <h1>AI Radio</h1>
          <p class="muted">Generate short tracks with AI music</p>
        </div>
        <div class="pill" id="healthPill">Checking…</div>
      </header>

      <main class="main">
        <section class="card">
          <h2>New station mix</h2>
          <div class="grid">
            <div class="stack">
              <label>
                <span>Station name</span>
                <input id="stationName" type="text" maxlength="120" placeholder="Example: Carnatic Flow FM" />
              </label>
              <label>
                <span>Station vibe / prompt</span>
                <textarea
                  id="prompt"
                  rows="5"
                  placeholder="Example: Carnatic classical mix. Veena and violin lead with mridangam and ghatam percussion. Bright raga color, concert ambience, devotional but energetic."
                ></textarea>
              </label>
            </div>
            <div class="stack">
              <label>
                <span>Track length (seconds)</span>
                <input id="lengthSec" type="number" min="5" max="180" value="30" />
              </label>
              <label>
                <span>Model</span>
                <select id="providerSelect">
                  <option value="acestep">ACE-Step (local)</option>
                  <option value="elevenlabs">ElevenLabs</option>
                </select>
              </label>
              <label>
                <span>ElevenLabs API key</span>
                <div class="inputWithButton">
                  <input id="elevenlabsApiKey" type="password" autocomplete="off" placeholder="sk_..." />
                  <button id="saveElevenlabsKeyBtn" class="secondary tinyButton" type="button">Save for session</button>
                </div>
              </label>
              <label>
                <span>How many tracks</span>
                <input id="variationCount" type="number" min="2" max="12" value="4" />
              </label>
              <p id="providerHint" class="muted tiny"></p>
            </div>
          </div>
          <div class="actions">
            <button id="generateMixBtn" type="button">Generate Mix</button>
            <button class="secondary" id="useExampleBtn" type="button">Use Carnatic example</button>
          </div>
          <div class="status" id="status"></div>
        </section>

        <section class="card nowPlaying">
          <h2>Now playing</h2>
          <div class="now">
            <div class="cover" aria-hidden="true"></div>
            <div class="playerWrap">
              <audio id="player" controls preload="none"></audio>
              <div class="row">
                <a id="downloadLink" class="link" href="#" download hidden>Download current track</a>
                <button id="nextBtn" class="secondary" type="button" disabled>Play next in list</button>
              </div>
            </div>
          </div>
        </section>

        <section class="card tracksCard">
          <div class="cardHeader">
            <h2>Generated tracks</h2>
            <button id="clearBtn" class="secondary" type="button">Clear</button>
          </div>
          <div id="tracks" class="tracks"></div>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
